name: trip_genie
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # Animations
  lottie: ^3.3.3
  
  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4

  # State Management
  flutter_riverpod: 3.3.1
  riverpod_annotation: 4.0.2

  # Navigation
  go_router: 17.3.0

  # HTTP Client
  dio: 5.9.2

  # Local Database
  sqflite: ^2.4.2+1
  path: 1.9.1

  #Environment Variable
  flutter_dotenv: 6.0.1

  shared_preferences: ^2.5.5

  intl: ^0.20.2

  flutter_svg: ^2.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - .env
    - assets/fonts/
    - assets/animations/
  
  fonts:
    - family: Gloock
      fonts:
        - asset: assets/fonts/Gloock-Regular.ttf
    
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
          weight: 400

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
